<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Lovely Letter To You My Love </title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="lockScreen">
  <h2>🔒 A Secret Awaits...</h2>
  <p>Only you know the key 💭</p>
  <input id="passwordInput" type="password" placeholder="Enter secret...">
  <button onclick="checkPassword()">Unlock 💝</button>
  <p id="error"></p>
  <p id="hint"></p>
</div>

<div id="background"></div>

<div id="recipient-name-outside">photo</div>

<div id="envelope">
  <div id="envelope-inner"><span>💌 Tap Me </span></div>
</div>

<div id="poem-container">
  <div id="poem"></div>
  <audio id="bg-music" loop>
    <source src="Love.mp3" type="audio/mpeg">
  </audio>
</div>

<script src="script.js"></script>
</body>
</html>
